name = "zola-quiet"
description = "A quiet, two-skin Zola theme: Minima-flavoured typography and a TUI/ncurses look with ASCII article frame. Both skins ship with matched light and dark modes plus a runtime toggle. Docs-style on-page TOC, addendum convention, iframe theme-sync protocol baked in."
license = "MIT"
homepage = "https://github.com/johnnybravo-xyz/zola-quiet"
min_version = "0.19.0"
demo = ""

[author]
name = "Ritesh Shrivastav"
homepage = "https://johnnybravo.xyz"

[extra]
# Reference list of [extra] keys the templates read. None are required;
# every block is wrapped in {% if %} guards so the theme degrades cleanly.
author = ""              # name in <meta author> and footer copyright line
github = ""              # username; renders a GitHub icon in the footer
linkedin = ""            # username; renders a LinkedIn icon in the footer
email = ""               # address; renders a mail icon in the footer
ascii_signature = ""     # optional multi-line ASCII art shown above content
homepage_post_limit = 0  # cap the front-page post list; 0/unset shows all
title= ""